name: Dev Deployment Workflow
run-name: ${{ github.ref_name }}-${{ github.run_number }}

on:
  push:
    branches:
      - main
      - 'release/**'
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'

defaults:
  run:
    shell: bash

env:
  AWS_REGION: ap-southeast-2   
  EKS_CLUSTER_NAME: EKS-DEV
  HELM_RELEASE_NAME: java-application 
  HELM_CHART_PATH: ./helm/java-application

jobs:
    deploy:
      name: Deploy
      runs-on: ubuntu-latest
      permissions:
        id-token: write
        contents: write 
      steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set Docker Tag Env Variable
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.docker_tag }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          fi
      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-2 
          role-to-assume: arn:aws:iam::865983312994:role/github-actions-role
      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.12.0'
      - name: Sign into cluster and install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest' # Or a specific version like 'v1.28.0'
        id: install
      - name: Deploy Helm Chart
        run: |
          kubectl get ns
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} ${{ env.HELM_CHART_PATH }} \
            --namespace default \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --set env.runtime-env-name="development"
            --atomic \
            --timeout 5m0s
    Tag:
      name: Tag
      runs-on: ubuntu-24.04
      permissions:
        contents: write
      needs: deploy
      steps:
      - uses: actions/checkout@v4
      - name: Git Tag 
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          release_branches: "release.*"
          custom_tag: dev
      - uses: tiacsys/clean-after-action@v3