name: Java Application - Build
run-name: ${{ github.ref_name }}-${{ github.run_number }}

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      target-runner:
        required: true
        type: string
        

defaults:
  run:
    shell: bash
    # runs-on:
    #   group: Build 
    #   labels: ubuntu

env:
  AWS_REGION: ap-southeast-2                   # set this to your preferred AWS region, e.g. us-west-1
  build-artifact-key: app-${{ github.sha }}
  ECR_REPOSITORY: java-application           # set this to your Amazon ECR repository name

jobs:
    Trivy:
      name: Trivy
      runs-on: ${{ fromJson(inputs.target-runner) }} 
      permissions:
        id-token: write # This is required for requesting the JWT for OIDC auth to AWS
        contents: read  # Required for checkout
      steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
      - name: POC Build Artefact
        run: |
          mkdir -p build-artefact 
          cp -pr build_artefact_poc/* build-artefact/
          aws s3 ls
      - name: Docker Build 
        id: Docker-Build 
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "BRANCH_NAME_ESCAPED=$( echo ${{ github.ref_name }} | tr "/" _  )" >> $GITHUB_ENV
          docker build -t java-application:${{ github.sha }} -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
  #        docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.APP_VERSION }}
  #        docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.APP_VERSION }}.${{ github.run_number }}
  #        docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
  #        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}" >> $GITHUB_OUTPUT
        working-directory: build-artefact/
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@0.3.1
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "java-application:${{ github.sha }}"
          format: 'sarif'
          output: "results.sarif"
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "results.sarif"
      - name: Listing Files
        run: find . -type f
      - name: Run Trivy vulnerability scanner HTML
        uses: aquasecurity/trivy-action@master
        with:
          # Change to 'fs' if scanning source code instead of a container image
          scan-type: 'image' 
          image-ref: 'java-application:${{ github.sha }}'
          format: 'template'
          template: '@trivy/html_template.tpl'
          output: 'trivy-report.html'
        # Ensures the pipeline continues even if vulnerabilities are found
        continue-on-error: true 

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.html
          retention-days: 30
    semgrep-scan:
      name: Run Semgrep and Generate HTML
      runs-on: ubuntu-latest

      steps:
        # Step 1: Check out the repository source code
        - name: Checkout Code
          uses: actions/checkout@v4

        # Step 2: Set up Python environment
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-state: '3.11'

        # # Step 3: Install Semgrep and the semgrep2html converter
        - name: Install Dependencies
          run: |
            pip install semgrep
            pip3 install jinja2

        # # Step 4: Run Semgrep scan and force it to export JSON
        # The '|| true' ensures the pipeline doesn't break instantly if vulnerabilities are found,
        # allowing the HTML generation step to actually execute.
        - name: Execute Semgrep Scan
          run: |
            semgrep scan --config=auto ./src --json --output=semgrep-results.json || true

        # # Step 5: Convert the JSON payload into a visual HTML dashboard
        - name: Generate HTML Report
          run: |
            python3 trivy/parse-semgrep.py --input semgrep-results.json --output semgrep-report.html --project-name "Java-Application" --only INFO,WARNING,ERROR
          #            semgrep2html --input semgrep-results.json --output semgrep-report.html

        # Step 6: Upload the generated HTML file to GitHub Actions artifacts
        - name: Upload HTML Report Artifact
          uses: actions/upload-artifact@v4
          with:
            name: semgrep-security-report
            path: semgrep-report.html
            retention-days: 30
