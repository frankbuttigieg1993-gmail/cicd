jobs:
    Trivy:
      name: Trivy
      runs-on: ubuntu-latest ##### trivy fails to install on self hosted runners and aws runners due to certificate checks. 
      permissions:
        id-token: write # This is required for requesting the JWT for OIDC auth to AWS
        contents: read  # Required for checkout
      steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: POC Build Artefact
        run: |
          mkdir -p build-artefact 
          cp -pr build_artefact_poc/* build-artefact/
      - name: Listing Files
        run: | 
         ls -alrt
      - name: Generate SBOM
        uses: advanced-security/sbom-generator-action@v0.0.1
        id: sbom
        env: 
          GITHUB_TOKEN: ${{ github.token }}
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with: 
          path: ${{steps.sbom.outputs.fileName }}
          name: "SBOM"
      - name: Gradle List Dependency Locks
        run: | 
         ./gradlew dependencies --write-locks
      - name: Trivy Scan Source Code Table
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.' # should be where build.gradle lives and trivy automatically scans dependnecices
          format: 'table'
          output: 'trivy-report.txt'
#          exit-code: '1' # Fails the pipeline if vulnerabilities match criteria
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          scanners: "vuln"
      - name: Publish Results to Step Summary
        run: |
          echo "### 🛡️ Trivy Security Scan Results" >> \$GITHUB_STEP_SUMMARY
          echo '```text' >> \$GITHUB_STEP_SUMMARY
          cat trivy-report.txt >> \$GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Debug workspace 
        run: | 
          ls -alrt
          ls -alrt trivy/
          ls -alrt trivy/html_template.tpl
          pwd ls -la ls -la trivy || true
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
      - name: Trivy Scan Source Code 
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs' 
          scan-ref: '.'
          format: 'template'
          template: '@trivy/html_template.tpl'
          scanners: "vuln"
          ignore-unfixed: true
          output: 'trivy-srccode-report.html'
      - name: Trivy Scan Source Code HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-srccode-report
          path: trivy-srccode-report.html
          retention-days: 30
      - name: Trivy Scan JAR 
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'rootfs'
          scan-ref: 'build_artefact/build/libs/env-printer-springboot-project-1.0.0.jar' # Explicit path to your JAR file
          format: 'template'
          template: '@trivy/html_template.tpl'
          scanners: "vuln"
          ignore-unfixed: true
          output: 'trivy-jar-report.html'
      - name: Trivy Scan JAR HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-jar-report
          path: trivy-jar-report.html
          retention-days: 30
      - name: Docker Build 
        id: Docker-Build 
        run: |
          echo "BRANCH_NAME_ESCAPED=$( echo ${{ github.ref_name }} | tr "/" _  )" >> $GITHUB_ENV
          docker build -t java-application:${{ github.sha }} .
        #  docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.APP_VERSION }}
        #  docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.APP_VERSION }}.${{ github.run_number }}
        #  docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
        #  echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}" >> $GITHUB_OUTPUT
        working-directory: build-artefact/
      - name: Trivy Docker Image 
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image' 
          image-ref: 'java-application:${{ github.sha }}'
          format: 'template'
          template: '@trivy/html_template.tpl'
          scanners: "vuln"
          ignore-unfixed: true
          output: 'trivy-dockerimage-report.html'
      - name: Trivy Scan Docker Image HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-dockerimage-report
          path: trivy-dockerimage-report.html
          retention-days: 30
      - name: Trivy Webgoat Docker Image SCan
        run: |
          curl -LO https://github.com/WebGoat/WebGoat/releases/download/v2025.3/webgoat-2025.3.jar
      - name: Trivy Scan JAR - Webgoat 
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'rootfs'
          scan-ref: 'webgoat-2025.3.jar' # Explicit path to your JAR file
          format: 'template'
          template: '@trivy/html_template.tpl'
          scanners: "vuln"
          ignore-unfixed: true
          output: 'trivy-webgoat-jar-report.html'
      - name: Trivy Scan JAR HTML Report - Webgoat
        uses: actions/upload-artifact@v4
        with:
          name: trivy-webgoat-jar-report
          path: trivy-webgoat-jar-report.html
          retention-days: 30
