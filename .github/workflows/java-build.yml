name: Java Application - Build Pipeline
run-name: ${{ github.ref_name }}-${{ github.run_number }}

on:
  workflow_dispatch:
  workflow_call:

defaults:
  run:
    shell: bash
      # runs-on:
      #   group: Build 
      #   labels: ubuntu

env:
  AWS_REGION: ap-southeast-2                   # set this to your preferred AWS region, e.g. us-west-1
  build-artifact-key: app-${{ github.sha }}
  ECR_REPOSITORY: java-application           # set this to your Amazon ECR repository name

  concurrency:
  group: build-quality-${{ github.ref }}
  cancel-in-progress: false

jobs:
    Build:
      name: Build
      runs-on: ubuntu-latest
      outputs:
        APP_VERSION: ${{ steps.app_version.outputs.APP_VERSION }}
      container:
        image: gradle:9.6.1-jdk21
      permissions:
        actions: read
        contents: read
        security-events: write # Required to upload results to the Security tab
      steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set APP_VERSION Output 
        id: app_version
        run: echo "APP_VERSION=$(cat ./build.gradle | grep 'version =' | cut -d "=" -f 2 | tr -d "'" | xargs)" >> "$GITHUB_OUTPUT"
      - name: Gradle Build 
        run: gradle clean test build jacocoTestReport jacocoTestCoverageVerification
        continue-on-error: true
      - name: Listing Files
        run: find . -type f
      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html
      - name: Upload Test Results 
        uses: actions/upload-artifact@v4 
        if: always() 
        with: 
          name: junit-test-results
          path: build/test-results/test
      - name: Upload build files
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.build-artifact-key }}
          path: |
            build/
            Dockerfile
