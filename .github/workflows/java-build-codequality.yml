name: Java Application - Code Quality
run-name: ${{ github.ref_name }}-${{ github.run_number }}

on:
  workflow_dispatch:
  workflow_call:

defaults:
  run:
    shell: bash
      # runs-on:
      #   group: Build 
      #   labels: ubuntu

env:
  AWS_REGION: ap-southeast-2                   # set this to your preferred AWS region, e.g. us-west-1
  build-artifact-key: app-${{ github.sha }}
  ECR_REPOSITORY: java-application           # set this to your Amazon ECR repository name

jobs:
    Build:
      name: Build
      runs-on: ubuntu-latest
      outputs:
        APP_VERSION: ${{ steps.app_version.outputs.APP_VERSION }}
      container:
        image: gradle:9.6.1-jdk21
      steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'java'
      - name: Set APP_VERSION Output 
        id: app_version
        run: echo "APP_VERSION=$(cat ./build.gradle | grep 'version =' | cut -d "=" -f 2 | tr -d "'" | xargs)" >> "$GITHUB_OUTPUT"
      - name: Gradle Build 
        run: gradle bootJar test --no-daemon
      - name: Listing Files
        run: find . -type f
      - name: Upload build files
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.build-artifact-key }}
          path: |
            build/
            src/
            Dockerfile
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
