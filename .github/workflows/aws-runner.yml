name: AWS Runner
run-name: ${{ github.ref_name }}-${{ github.run_number }}

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      AWS_GITHUB_ACCESS_KEY_ID:
        required: true
      AWS_GITHUB_SECRET_ACCESS_KEY_ID:
        required: true
      AWS_GITHUB_RUNNER_TOKEN:
        required: true     
        
defaults:
  run:
    shell: bash
    # runs-on:
    #   group: Build 
    #   labels: ubuntu

concurrency:
  group: aws-runner-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-2                   # set this to your preferred AWS region, e.g. us-west-1
  build-artifact-key: app-${{ github.sha }}
  ECR_REPOSITORY: java-application           # set this to your Amazon ECR repository name

jobs:
  start-runner:
    name: Start self-hosted EC2 runner
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.start-ec2-runner.outputs.label }}
      ec2-instance-id: ${{ steps.start-ec2-runner.outputs.ec2-instance-id }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_GITHUB_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_GITHUB_SECRET_ACCESS_KEY_ID }}
          aws-region: 'ap-southeast-2'
      - name: Start EC2 runner
        id: start-ec2-runner
        uses: machulav/ec2-github-runner@v2
        with:
          mode: start
          github-token: ${{ secrets.AWS_GITHUB_RUNNER_TOKEN }}
          ec2-image-id: ami-07709f5ec3cb18820
          ec2-instance-type: t3.medium
          subnet-id: subnet-0b38821d605af3a64
          security-group-id: sg-004bf88b5a89e74ea
          iam-role-name: github-actions-role
          aws-resource-tags: > # optional, requires additional permissions
            [
              {"Key": "Name", "Value": "ec2-github-runner"},
              {"Key": "GitHubRepository", "Value": "${{ github.repository }}"}
            ]
          block-device-mappings: > # optional, to customize EBS volumes
            [
              {"DeviceName": "/dev/sda1", "Ebs": {"VolumeSize": 30, "VolumeType": "gp3"}}
            ]
  Build:
    name: Build
    needs: start-runner
    runs-on: ${{ needs.start-runner.outputs.label }}
    outputs:
      APP_VERSION: ${{ steps.app_version.outputs.APP_VERSION }}
    container:
      image: gradle:9.6.1-jdk21
      # options: --user 1000:1000
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set APP_VERSION Output 
      id: app_version
      run: echo "APP_VERSION=$(cat ./build.gradle | grep 'version =' | cut -d "=" -f 2 | tr -d "'" | xargs)" >> "$GITHUB_OUTPUT"
    - name: Build with Gradle
      run:  gradle clean build 
      continue-on-error: true
    - name: Upload build files
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.build-artifact-key }}
        path: |
          build/
          Dockerfile
    - name: Run OWASP Dependency-Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'MyProjectName'
        path: '.'
        format: 'SARIF'
        out: "owasp-results.sarif"
    - name: Listing Files
      run: find . -type f
    - name: Upload OWASP scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: "${{github.workspace}}/owasp-results.sarif"
    # - name: OWASP Report
    #   id: html_preview
    #   uses: pavi2410/html-preview-action@v2
    #   with:
    #     html_file: ${{github.workspace}}/reports/dependency-check-report.html
    # - name: Upload Test results
    #   uses: actions/upload-artifact@master
    #   with:
    #       name: Depcheck report
    #       path: ${{github.workspace}}/reports/dependency-check-report.html

    - name: Build Overview
      run: |
        # Generate your HTML block
        echo "<h3>🚀 Build Overview </h3>" >> $GITHUB_STEP_SUMMARY
        echo "<table border='1'><tr><th>Item</th><th>Description</th></tr><tr><td>Git Commit </td><td>${{ github.sha }}</td></tr><tr><td>Branch</td><td>${{ github.ref_name }}</td></tr></table>" >> $GITHUB_STEP_SUMMARY
  Unit_Test:
    name: Unit_Test
    runs-on: ${{ needs.start-runner.outputs.label }}
    needs: [start-runner, Build]
    container:
      image: gradle:9.6.1-jdk21
      # options: --user 1000:1000
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Run Unit Tests
      run: gradle test --no-daemon
      continue-on-error: true
    - name: Copy Sample Test Report 
      run: mkdir -p build/test-results/sample && cp -a junit-example.xml build/test-results/sample/
    - name: Upload Test Report files
      uses: actions/upload-artifact@v4
      with:
        name: unit-test-report
        path: build/test-results/sample/
    - name: Publish Test Report To GitHub
      uses: dorny/test-reporter@v2
      with:
        artifact: unit-test-report  # artifact name
        name: unit-test-report                  # Name of the check run which will be created
        path: '*.xml'                     # Path to test results (inside artifact .zip)
        reporter: jest-junit              # Format of test results
        fail-on-error: 'false'
  Docker_Push:
    name: Docker Push
    runs-on: ${{ needs.start-runner.outputs.label }}
    permissions:
      id-token: write # This is required for requesting the JWT for OIDC auth to AWS
      contents: read  # Required for checkout
    needs: [start-runner, Build]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        clean: true
    - name: "Configure AWS Credentials - Action for GitHub Actions"
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ap-southeast-2 
        role-to-assume: arn:aws:iam::865983312994:role/github-actions-role
    - name: Verify AWS Identity
      run: |
        aws sts get-caller-identity
        aws s3 ls
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.build-artifact-key }}
        path: build-artefact/
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1
    - name: Docker Build 
      id: Docker-Build 
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        APP_VERSION: ${{ needs.Build.outputs.APP_VERSION }}
      run: |
        echo "BRANCH_NAME_ESCAPED=$( echo ${{ github.ref_name }} | tr "/" _  )" >> $GITHUB_ENV
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} -t $ECR_REGISTRY/$ECR_REPOSITORY:$APP_VERSION -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.APP_VERSION }}.${{ github.run_number }} .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.APP_VERSION }}
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ env.APP_VERSION }}.${{ github.run_number }}
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}" >> $GITHUB_OUTPUT
      working-directory: build-artefact/
    - name: Install Trivy
      uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.36.0
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        APP_VERSION: ${{ needs.Build.outputs.APP_VERSION }}
      with:
        image-ref: "$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"
        format: 'sarif'
        output: "results.sarif"

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: "results.sarif"
  Tag:
    name: Tag
    runs-on: ${{ needs.start-runner.outputs.label }}
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   
    needs: [start-runner, Build, Docker_Push]
    steps:
    - uses: actions/checkout@v4
      with:
        clean: true
    - name: Git Tag 
      id: tag_version
      uses: mathieudutour/github-tag-action@v6.2
      with:
        release_branches: "release.*"
        github_token: ${{ env.GITHUB_TOKEN }}
        custom_tag: ${{ needs.Build.outputs.APP_VERSION }}.${{ github.run_number }}      
  delete-runner:
    name: Delete the self-hosted EC2 runner
    needs:
      - start-runner # required to get output from the start-runner job
      - Tag 
      - Unit_Test
      - Docker_Push
    runs-on: ubuntu-latest
    if: ${{ always() }} # required to stop the runner even if the error happened in the previous jobs
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_GITHUB_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_GITHUB_SECRET_ACCESS_KEY_ID }}
          aws-region: ap-southeast-2
      - name: Terminate EC2 instance
        run: |
          aws ec2 terminate-instances \
            --instance-ids ${{ needs.start-runner.outputs.ec2-instance-id }} \
            --region ap-southeast-2