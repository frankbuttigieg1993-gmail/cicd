  #         stack_destroy: false
  #         tf_state_bucket_destroy: true
  #         tf_state_bucket: terraform-frankbuttigieg1993-github-runners
    start-runner:
        timeout-minutes: 5              # normally it only takes 1-2 minutes
        name: Start self-hosted EC2 runner   
        runs-on: ubuntu-latest   
        steps:      
          - name: Start EC2 runner
            id: start-ec2-runner
            uses: unblocked/ec2-action-builder@v1.11
            with:
              github_token: ${{ secrets.GH_PAT_TOKEN }}
              aws_access_key_id: ${{ secrets.AWS_GITHUB_ACCESS_KEY_ID }}
              aws_secret_access_key: ${{ secrets.AWS_GITHUB_SECRET_ACCESS_KEY_ID }}
              aws_region: "ap-southeast-2"
              ec2_instance_type: t3.medium
              ec2_ami_id: 'ami-06259b63260eddc13'
              aws_iam_role_arn: "arn:aws:iam::865983312994:role/github-actions-role"
              ec2_subnet_id: "subnet-0b38821d605af3a64"
              ec2_security_group_id: "sg-004bf88b5a89e74ea"
              ec2_instance_ttl: 5                # Optional (default is 60 minutes)
              ec2_spot_instance_strategy: MaxPerformance    # Other options are: SpotOnly, BestEffort, MaxPerformance 
              ec2_instance_tags: >                          # Required for IAM role resource permission scoping
                              [
                                {"Key": "Owner", "Value": "Github-Runner"}
                              ]
    Build:
      name: Build
      runs-on: ${{ github.run_id }}   
      needs: start-runner
      outputs:
        APP_VERSION: ${{ steps.app_version.outputs.APP_VERSION }}
      # container:
      #   image: gradle:9.6.1-jdk21
      #   options: --user 1000:1000
      steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set APP_VERSION Output 
        id: app_version
        run: echo "APP_VERSION=$(cat ./build.gradle | grep 'version =' | cut -d "=" -f 2 | tr -d "'" | xargs)" >> "$GITHUB_OUTPUT"
      - name: Printing AWS Version
        run: cat /etc/os-release
      # - name: Build with Gradle
      #   run:  gradle clean test build 
      #   continue-on-error: true
      - name: Listing Files
        run: find . -type f
      - name: Upload build files
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.build-artifact-key }}
          path: |
            Dockerfile
