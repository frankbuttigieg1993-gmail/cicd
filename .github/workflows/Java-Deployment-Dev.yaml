name: Dev Deployment Workflow
run-name: ${{ inputs.docker_tag }}

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: '1.0.0.56'
  workflow_call:

permissions:
  id-token: write
  contents: write

defaults:
  run:
    shell: bash

