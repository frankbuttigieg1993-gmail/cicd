name: Dev Deployment Workflow
run-name: ${{ inputs.docker_tag }}

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: '1.0.0.56'
  workflow_call:
    secrets:
      GH_PAT_TOKEN: # Define a key for your secret
        required: true
        description: "API Token used for deployment"

permissions:
  id-token: write
  contents: write

defaults:
  run:
    shell: bash

env:
  AWS_REGION: ap-southeast-2   
  EKS_CLUSTER_NAME: EKS-DEV
  HELM_RELEASE_NAME: java-application 
  HELM_CHART_PATH: ./helm/java-application

