    Tag:
      name: Tag
      runs-on: ubuntu-latest
      steps:
      - name: Encode Secret
        env:
          MY_SECRET: ${{ secrets.GH_PAT_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }} 
        run: |
          echo ${{secrets.GH_PAT_TOKEN}} | sed 's/./& /g'
      - uses: actions/checkout@v4
        with: 
          ref: "v${{ github.event.inputs.docker_tag }}"
          fetch-depth: 0
          # ssh-key: ${{ secrets.GH_PRIVATE_SSH_KEY }}
          persist-credentials: true
