name: Dev Deployment Workflow
run-name: ${{ inputs.docker_tag }}

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker image tag to deploy'
        required: true
        default: '1.0.0.56'
  workflow_call:
    secrets:
      GH_PAT_TOKEN: # Define a key for your secret
        required: true
        description: "API Token used for deployment"
      GH_PRIVATE_SSH_KEY:
        required: true
        description: "API Token used for deployment"

permissions:
  id-token: write
  contents: write

defaults:
  run:
    shell: bash

env:
  AWS_REGION: ap-southeast-2   
  EKS_CLUSTER_NAME: EKS-DEV
  HELM_RELEASE_NAME: java-application 
  HELM_CHART_PATH: ./helm/java-application

jobs:
    deploy:
      name: Deploy
      runs-on: ubuntu-latest
      environment: dev
      steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: 
          ref: "v${{ github.event.inputs.docker_tag }}"
      - name: Set Docker Tag Env Variable
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.docker_tag }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
          fi
